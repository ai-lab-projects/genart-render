name: render
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'render command, e.g. "compose.py --style lofi --wav outputs/lofi.wav --roll outputs/lofi.mp4 --bars 20"'
        required: true
        default: 'physics_sim.py --scene hexagon --output outputs/hex.mp4 --seconds 30'
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write   # Release 作成に必要
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg portaudio19-dev
      - name: deps
        run: pip install -r requirements.txt
      - name: soundfonts
        run: bash fetch_soundfonts.sh
      - name: render
        run: |
          mkdir -p outputs
          GENART_SF_DIR="$PWD/soundfonts" python src/${{ inputs.command }}
      # 成果物は artifact でなく Release で受け渡す (Release ストレージは無料・無制限、
      # Actions の 0.5GB 枠を一切食わない)。取得側 (genart_ci.sh) が DL 後この Release を削除する。
      - name: publish outputs as a release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="render-${{ github.run_id }}"
          gh release create "$TAG" outputs/* \
            --title "$TAG" \
            --notes "auto render output for run ${{ github.run_id }} — delete after download"
